<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Acerto de Viagem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef1f6;
      --card: #ffffff;
      --border: #dde2ea;
      --accent: #1a56db;
      --accent-dark: #1648c0;
      --accent-light: #eff4ff;
      --text: #1b2537;
      --muted: #5f738f;
      --error: #c8000a;
      --success: #14803c;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
    }

    /* ── CARD ── */
    .card {
      max-width: 820px; margin: 0 auto;
      background: var(--card); border-radius: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 8px 28px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a56db 0%, #1040be 100%);
      padding: 2.25rem 2.5rem;
      display: flex; align-items: center; gap: 1.1rem;
    }
    .header-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .card-header h1 { font-size: 1.55rem; font-weight: 700; color: #fff; line-height: 1.2; }
    .card-header p  { color: rgba(255,255,255,0.72); font-size: 0.82rem; margin-top: 0.3rem; }

    .card-body { padding: 2.5rem; }

    /* ── SECTIONS ── */
    .section { margin-bottom: 2.25rem; }
    .section-title {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.1rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── GRIDS ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) {
      .g2, .g3 { grid-template-columns: 1fr; }
      .card-body { padding: 1.5rem; }
      .card-header { padding: 1.5rem; }
    }

    /* ── FIELDS ── */
    .field { display: flex; flex-direction: column; gap: 0.38rem; }
    .field label { font-size: 0.76rem; font-weight: 600; color: var(--muted); letter-spacing: 0.02em; }
    .field input, .field select, .field textarea {
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 0.65rem 0.9rem; font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif; color: var(--text);
      background: #fff; outline: none; width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── PAYMENT FLAG ── */
    /* Used inside both single-exp cards and slot cards */
    .pay-row {
      display: flex; gap: 0.4rem;
      padding: 0.45rem 0.7rem 0.5rem;
      border-top: 1px solid #d4dff8;
    }
    .pay-btn {
      flex: 1; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.02em; text-align: center; line-height: 1.35;
      padding: 0.32rem 0.25rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      cursor: pointer; background: #fff; color: var(--muted);
      transition: all 0.12s; user-select: none;
    }
    .pay-btn input[type="radio"] { display: none; }
    .pay-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pay-btn.sel-pix  { background: #fef9c3; border-color: #d97706; color: #92400e; }
    .pay-btn.sel-corp { background: #dbeafe; border-color: var(--accent); color: var(--accent-dark); }

    /* ── SINGLE EXPENSE CARDS ── */
    .single-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }
    @media (max-width: 600px) { .single-grid { grid-template-columns: 1fr; } }

    .exp-card {
      border: 1.5px solid var(--border); border-radius: 12px;
      background: #fafbfc; overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .exp-card.has-file { border-color: var(--accent); background: var(--accent-light); }

    .exp-card-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--muted);
      padding: 0.6rem 0.85rem 0.45rem;
      border-bottom: 1px solid var(--border);
    }
    .exp-card.has-file .exp-card-title { color: var(--accent); border-bottom-color: #bfcfff; }

    .upload-zone {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.35rem; padding: 1rem 0.75rem;
      cursor: pointer; position: relative; min-height: 84px;
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { color: #a8b5c8; transition: color 0.15s; }
    .exp-card.has-file .upload-icon { color: var(--accent); }
    .upload-lbl {
      font-size: 0.74rem; font-weight: 500; color: var(--muted);
      text-align: center; line-height: 1.4;
    }
    .exp-card.has-file .upload-lbl {
      color: var(--accent-dark); font-weight: 600;
      max-width: 95%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .exp-pay { display: none; }
    .exp-card.has-file .exp-pay { display: flex; }

    /* ── MULTI-SLOT (15 each) ── */
    .multi-wrap { display: flex; flex-direction: column; gap: 1.25rem; }
    .multi-group-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem;
    }
    .slots-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.6rem;
    }

    .slot-card {
      border: 1.5px dashed var(--border); border-radius: 10px;
      background: #fafbfc; overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .slot-card.has-file { border-style: solid; border-color: var(--accent); background: var(--accent-light); }

    .slot-num {
      font-size: 0.62rem; font-weight: 700; color: #b0bac8;
      padding: 0.32rem 0.55rem 0; letter-spacing: 0.04em;
    }
    .slot-card.has-file .slot-num { color: var(--accent); }

    .slot-upload {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.2rem; padding: 0.5rem 0.5rem 0.5rem;
      cursor: pointer; position: relative; min-height: 58px;
    }
    .slot-upload input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .slot-icon { color: #c4cdd8; }
    .slot-card.has-file .slot-icon { color: var(--accent); }
    .slot-lbl {
      font-size: 0.67rem; color: var(--muted); text-align: center; line-height: 1.3;
    }
    .slot-card.has-file .slot-lbl {
      color: var(--accent-dark); font-weight: 600;
      max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .slot-pay { display: none; }
    .slot-pay .pay-btn { font-size: 0.58rem; padding: 0.26rem 0.1rem; }
    .slot-card.has-file .slot-pay { display: flex; }
    .slot-pay { gap: 0.28rem; padding: 0.28rem 0.4rem 0.36rem; border-top: 1px solid #c8d7ff; }

    /* ── CHECKBOX ── */
    .check-label {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; background: #fff;
      transition: border-color 0.15s, background 0.15s;
    }
    .check-label:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }
    .check-label input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); flex-shrink: 0; }
    .check-label span { font-size: 0.875rem; font-weight: 500; }

    /* ── SIGNATURE ── */
    .sig-wrap {
      border: 2px dashed var(--border); border-radius: var(--radius);
      background: #fcfcfd; overflow: hidden; position: relative;
    }
    .sig-wrap canvas { display: block; width: 100%; height: 190px; cursor: crosshair; touch-action: none; }
    .sig-hint {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.5rem; pointer-events: none; opacity: 1; transition: opacity 0.2s; color: #c0c8d4;
    }
    .sig-hint span { font-size: 0.8rem; }
    .btn-clear {
      background: none; border: none; font-size: 0.78rem; color: var(--error);
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-weight: 600; padding: 0.3rem 0; margin-top: 0.45rem;
    }
    .btn-clear:hover { text-decoration: underline; }

    /* ── MESSAGE ── */
    #messageBox {
      padding: 0.75rem 1rem; border-radius: var(--radius);
      font-size: 0.875rem; font-weight: 500; display: none; margin-bottom: 1rem;
    }

    /* ── SUBMIT ── */
    .submit-row {
      display: flex; justify-content: flex-end;
      padding-top: 1.5rem; border-top: 1px solid var(--border); margin-top: 0.5rem;
    }
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      padding: 0.85rem 2.2rem; border-radius: 9999px;
      font-size: 0.9rem; font-weight: 700; font-family: 'DM Sans', sans-serif;
      cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 4px 16px rgba(26,86,219,0.3);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(26,86,219,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── LOADING ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.82); backdrop-filter: blur(4px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .spinner {
      border: 3px solid rgba(0,0,0,0.1); border-left-color: var(--accent);
      border-radius: 50%; width: 36px; height: 36px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SUCCESS ── */
    #successScreen {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.25rem; padding: 4rem 2rem; text-align: center;
    }
    .check-circle {
      width: 72px; height: 72px; border-radius: 50%; background: #dcfce7;
      display: flex; align-items: center; justify-content: center;
    }
    #successScreen h2 { font-size: 1.6rem; font-weight: 700; }
    #successScreen p  { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="header-icon">
      <svg width="26" height="26" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73L11 21.73a2 2 0 0 0 2 0L20 17.73A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <div>
      <h1>Acerto de Viagem</h1>
      <p>Preencha todos os campos e assine ao final</p>
    </div>
  </div>

  <div class="card-body">
  <div id="formContainer">

    <!-- EQUIPE -->
    <div class="section">
      <div class="section-title">Equipe</div>
      <div class="g2">
        <div class="field"><label>Técnico</label><input type="text" id="tecnico" placeholder="Nome do técnico"></div>
        <div class="field"><label>Auxiliares</label><input type="text" id="auxiliares" placeholder="Nome(s) do(s) auxiliar(es)"></div>
      </div>
    </div>

    <!-- SERVIÇO -->
    <div class="section">
      <div class="section-title">Dados do Serviço</div>
      <div class="g2">
        <div class="field"><label>Data de Início do Serviço</label><input type="date" id="dataInicio"></div>
        <div class="field"><label>Veículo</label><input type="text" id="veiculo" placeholder="Ex: Gol – ABC-1234"></div>
        <div class="field"><label>Nº de Série</label><input type="text" id="numSerie" placeholder="Número de série"></div>
        <div class="field">
          <label>Serviço Prestado</label>
          <select id="servicoPrestado">
            <option value="">Selecione...</option>
            <option>Manutenção</option>
            <option>Instalação</option>
            <option>Startup</option>
            <option>Entrega</option>
            <option>Visita técnica</option>
            <option>Visita comercial</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CLIENTE -->
    <div class="section">
      <div class="section-title">Cliente</div>
      <div class="g3">
        <div class="field"><label>Cliente</label><input type="text" id="cliente" placeholder="Nome do cliente"></div>
        <div class="field"><label>Cidade</label><input type="text" id="cidade" placeholder="Cidade"></div>
        <div class="field"><label>Equipamento</label><input type="text" id="equipamento" placeholder="Equipamento"></div>
      </div>
    </div>

    <!-- FINANCEIRO -->
    <div class="section">
      <div class="section-title">Financeiro</div>
      <div class="g2">
        <div class="field"><label>Adiantamento (R$)</label><input type="number" id="adiantamento" placeholder="0,00" step="0.01" min="0"></div>
        <div class="field"><label>Data das NF's</label><input type="date" id="dataNFs"></div>
      </div>
    </div>

    <!-- DESPESAS SIMPLES -->
    <div class="section">
      <div class="section-title">Despesas — Alimentação &amp; Hospedagem</div>
      <div class="single-grid" id="singleGrid"></div>
    </div>

    <!-- DESPESAS MÚLTIPLAS -->
    <div class="section">
      <div class="section-title">Despesas — Pedágio, Combustível &amp; Outros</div>
      <div class="multi-wrap" id="multiWrap"></div>
    </div>

    <!-- ASSINATURA -->
    <div class="section">
      <div class="section-title">Assinatura do Técnico</div>
      <div class="field" style="margin-bottom:0.85rem;">
        <label>Assinatura realizada?</label>
        <label class="check-label">
          <input type="checkbox" id="assinaturaRealizada">
          <span>Sim, assinatura confirmada</span>
        </label>
      </div>
      <div class="sig-wrap">
        <canvas id="canvasTech"></canvas>
        <div class="sig-hint" id="sigHint">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
          <span>Assine aqui</span>
        </div>
      </div>
      <button type="button" class="btn-clear" onclick="clearCanvas()">✕ Limpar assinatura</button>
    </div>

    <!-- OBSERVAÇÕES -->
    <div class="section">
      <div class="section-title">Observações</div>
      <div class="field">
        <textarea id="observacoes" placeholder="Observações adicionais..."></textarea>
      </div>
    </div>

    <div id="messageBox"></div>

    <div class="submit-row">
      <button type="button" id="saveBtn" onclick="handleSubmit()" class="btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Registrar Acerto de Viagem
      </button>
    </div>

  </div><!-- /formContainer -->

  <!-- SUCCESS -->
  <div id="successScreen">
    <div class="check-circle">
      <svg width="36" height="36" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Acerto Registrado!</h2>
    <p>O acerto de viagem foi enviado com sucesso.</p>
  </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  SHARED: PAYMENT FLAG BUILDER
// ─────────────────────────────────────────────
const PAY = [
  { value: 'dinheiro_pix', label: 'Dinheiro / Pix',      cls: 'sel-pix'  },
  { value: 'cartao_corp',  label: 'Cartão Corporativo',   cls: 'sel-corp' },
];

function buildPayRow(radioName, extraClass) {
  const div = document.createElement('div');
  div.className = `pay-row ${extraClass || ''}`;
  PAY.forEach(opt => {
    const lbl = document.createElement('label');
    lbl.className = 'pay-btn';
    lbl.dataset.cls = opt.cls;
    lbl.innerHTML = `<input type="radio" name="${radioName}" value="${opt.value}"> ${opt.label}`;
    lbl.addEventListener('click', () => {
      div.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('sel-pix','sel-corp'));
      lbl.querySelector('input').checked = true;
      lbl.classList.add(opt.cls);
    });
    div.appendChild(lbl);
  });
  return div;
}

function getRadioVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}

// ─────────────────────────────────────────────
//  SINGLE EXPENSE CARDS (Café, Almoço, Janta, Hotel)
// ─────────────────────────────────────────────
const SINGLES = [
  { key: 'cafe',   label: 'Café'   },
  { key: 'almoco', label: 'Almoço' },
  { key: 'janta',  label: 'Janta'  },
  { key: 'hotel',  label: 'Hotel'  },
];

const singleGrid = document.getElementById('singleGrid');

SINGLES.forEach(({ key, label }) => {
  const card = document.createElement('div');
  card.className = 'exp-card';
  card.id = `expcard-${key}`;

  // title
  const title = document.createElement('div');
  title.className = 'exp-card-title';
  title.textContent = label;

  // upload zone
  const zone = document.createElement('label');
  zone.className = 'upload-zone';

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.id   = `file-${key}`;
  fileInput.accept = 'image/*,.pdf';

  const icon = document.createElement('div');
  icon.className = 'upload-icon';
  icon.innerHTML = `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>`;

  const lbl = document.createElement('div');
  lbl.className = 'upload-lbl';
  lbl.id = `lbl-${key}`;
  lbl.innerHTML = 'Clique para anexar<br>imagem ou PDF';

  zone.appendChild(fileInput);
  zone.appendChild(icon);
  zone.appendChild(lbl);

  // payment row (hidden until file chosen)
  const payRow = buildPayRow(`pay-${key}`, 'exp-pay');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      card.classList.add('has-file');
      lbl.textContent = fileInput.files[0].name;
    } else {
      card.classList.remove('has-file');
      lbl.innerHTML = 'Clique para anexar<br>imagem ou PDF';
    }
  });

  card.appendChild(title);
  card.appendChild(zone);
  card.appendChild(payRow);
  singleGrid.appendChild(card);
});

// ─────────────────────────────────────────────
//  MULTI SLOTS (Pedágio, Combustível, Outros — 15 each)
// ─────────────────────────────────────────────
const MULTIS = [
  { key: 'pedagio',     label: 'Pedágio'     },
  { key: 'combustivel', label: 'Combustível'  },
  { key: 'outros',      label: 'Outros'       },
];
const SLOTS = 15;
const multiWrap = document.getElementById('multiWrap');

MULTIS.forEach(({ key, label }) => {
  const group = document.createElement('div');

  const glabel = document.createElement('div');
  glabel.className = 'multi-group-label';
  glabel.textContent = label;

  const grid = document.createElement('div');
  grid.className = 'slots-grid';

  for (let i = 1; i <= SLOTS; i++) {
    const sid  = `${key}-${i}`;
    const slot = document.createElement('div');
    slot.className = 'slot-card';
    slot.id = `slot-${sid}`;

    const num = document.createElement('div');
    num.className = 'slot-num';
    num.textContent = `#${String(i).padStart(2,'0')}`;

    const zone = document.createElement('label');
    zone.className = 'slot-upload';

    const fi = document.createElement('input');
    fi.type   = 'file';
    fi.id     = `slotfile-${sid}`;
    fi.accept = 'image/*,.pdf';

    const sicon = document.createElement('div');
    sicon.className = 'slot-icon';
    sicon.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>`;

    const slbl = document.createElement('div');
    slbl.className = 'slot-lbl';
    slbl.id = `slotlbl-${sid}`;
    slbl.textContent = 'Anexar';

    zone.appendChild(fi);
    zone.appendChild(sicon);
    zone.appendChild(slbl);

    const payRow = buildPayRow(`slotpay-${sid}`, 'slot-pay');

    fi.addEventListener('change', () => {
      if (fi.files[0]) {
        slot.classList.add('has-file');
        slbl.textContent = fi.files[0].name;
      } else {
        slot.classList.remove('has-file');
        slbl.textContent = 'Anexar';
      }
    });

    slot.appendChild(num);
    slot.appendChild(zone);
    slot.appendChild(payRow);
    grid.appendChild(slot);
  }

  group.appendChild(glabel);
  group.appendChild(grid);
  multiWrap.appendChild(group);
});

// ─────────────────────────────────────────────
//  SIGNATURE
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvasTech');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('sigHint');
let drawing = false, lastX = 0, lastY = 0, hasSig = false;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = '#1b2537'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function pos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function startDraw(e) { drawing = true; ({x:lastX,y:lastY} = pos(e)); hint.style.opacity='0'; hasSig=true; }
function draw(e) {
  if (!drawing) return;
  const {x,y} = pos(e);
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
  lastX=x; lastY=y;
}
function stopDraw() { drawing = false; }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup',   stopDraw);
canvas.addEventListener('mouseout',  stopDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend',   stopDraw);

function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hasSig=false; hint.style.opacity='1'; resizeCanvas();
}
function isBlank() {
  if (!hasSig) return true;
  const b = document.createElement('canvas'); b.width=canvas.width; b.height=canvas.height;
  return canvas.toDataURL() === b.toDataURL();
}

// ─────────────────────────────────────────────
//  UI
// ─────────────────────────────────────────────
const messageBox = document.getElementById('messageBox');

function showMessage(text, type) {
  messageBox.textContent = text;
  messageBox.style.cssText = `
    display:block; padding:0.75rem 1rem; border-radius:10px;
    font-size:0.875rem; font-weight:500; margin-bottom:1rem;
    background:${type==='error'?'#fff1f1':'#f0fdf4'};
    color:${type==='error'?'#c8000a':'#14803c'};
    border:1px solid ${type==='error'?'#fecaca':'#bbf7d0'};
  `;
  messageBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(v) {
  document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none';
  document.getElementById('saveBtn').disabled = v;
}

function showSuccess() {
  document.getElementById('formContainer').style.display = 'none';
  document.getElementById('successScreen').style.display = 'flex';
}

function val(id) { return document.getElementById(id).value.trim(); }

function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file);
  });
}

// ─────────────────────────────────────────────
//  SUBMIT
// ─────────────────────────────────────────────
async function handleSubmit() {
  messageBox.style.display = 'none';
  if (!val('tecnico'))    { showMessage('Informe o nome do técnico.', 'error'); return; }
  if (!val('dataInicio')) { showMessage('Informe a data de início do serviço.', 'error'); return; }
  if (!val('cliente'))    { showMessage('Informe o nome do cliente.', 'error'); return; }
  if (isBlank())          { showMessage('Desenhe a assinatura do técnico.', 'error'); return; }

  setLoading(true);

  // Collect single expenses
  const singleData = {};
  for (const { key } of SINGLES) {
    const fi = document.getElementById(`file-${key}`);
    singleData[key] = {
      file: fi.files[0] ? await fileToB64(fi.files[0]) : '',
      pay:  getRadioVal(`pay-${key}`),
    };
  }

  // Collect multi-slot expenses
  const multiData = {};
  for (const { key } of MULTIS) {
    multiData[key] = [];
    for (let i = 1; i <= SLOTS; i++) {
      const sid = `${key}-${i}`;
      const fi  = document.getElementById(`slotfile-${sid}`);
      if (fi.files[0]) {
        multiData[key].push({ slot: i, file: await fileToB64(fi.files[0]), pay: getRadioVal(`slotpay-${sid}`) });
      }
    }
  }

  const payload = {
    tecnico:             val('tecnico'),
    auxiliares:          val('auxiliares'),
    dataInicio:          val('dataInicio'),
    veiculo:             val('veiculo'),
    numSerie:            val('numSerie'),
    servicoPrestado:     val('servicoPrestado'),
    cliente:             val('cliente'),
    cidade:              val('cidade'),
    equipamento:         val('equipamento'),
    adiantamento:        val('adiantamento'),
    dataNFs:             val('dataNFs'),
    despesas:            { single: singleData, multi: multiData },
    assinaturaRealizada: document.getElementById('assinaturaRealizada').checked ? 'Sim' : 'Não',
    observacoes:         val('observacoes'),
    signature:           canvas.toDataURL('image/png'),
  };

  const fd = new FormData();
  fd.append('data', JSON.stringify(payload));

  try {
    await fetch(
      '/exec',
      { method: 'POST', body: fd, mode: 'no-cors' }
    );
    showSuccess();
  } catch (err) {
    showMessage('Erro ao enviar. Verifique a conexão e tente novamente.', 'error');
  } finally {
    setLoading(false);
  }
}
</script>
